services:
  mc:
    image: itzg/minecraft-server:latest
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
      - "8100:8100"
    environment:
      EULA: "TRUE"
      TYPE: "AUTO_CURSEFORGE"
      CF_PAGE_URL: "https://www.curseforge.com/minecraft/modpacks/aoc/files/7870055"
      CF_API_KEY: ${CF_API_KEY}
      # Extra mods not in the base pack (CurseForge project IDs)
      CURSEFORGE_FILES: |
        431733
        361579
        997330
        238551
        1139062
        1264423
        1474749
        6094982
      # Extra mods not on CurseForge (Modrinth project IDs)
      MODRINTH_PROJECTS: |
        fALzjamp
        VfHc5JEX
      MEMORY: "12288M"
      MOTD: "All of Create 1.21.1"
      USE_MEOWICE_FLAGS: "true"
      TZ: "America/Los_Angeles"
      DIFFICULTY: "3"
      ENABLE_COMMAND_BLOCK: "true"
      ENTITY_BROADCAST_RANGE_PERCENTAGE: "200"
      VIEW_DISTANCE: "18"
      SPAWN_PROTECTION: "0"
      SYNC_CHUNK_WRITES: "false"
      ENABLE_WHITELIST: "true"
      VANILLATWEAKS_SHARECODE: "3sQdEZ"
      ANNOUNCE_PLAYER_ACHIEVEMENTS: "true"
      ENABLE_ROLLING_LOGS: "true"
    volumes:
      - "./data:/data"
      - ./downloads:/downloads
