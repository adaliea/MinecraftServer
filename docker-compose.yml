services:
  mc:
    restart: unless-stopped
    image: itzg/minecraft-server:latest
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
      - "8100:8100"
    environment:
      EULA: "TRUE"
      TYPE: "AUTO_CURSEFORGE"
      CF_PAGE_URL: "https://www.curseforge.com/minecraft/modpacks/aoc/files/7870055"
      CF_API_KEY: ${CF_API_KEY}
      # Extra mods not in the base pack (CurseForge project IDs):
      #   431733  = LuckPerms
      #   361579  = spark
      #   997330  = Modflared
      #   238551  = GraveStone Mod
      #   1139062 = Gravestone x Curios API Compat
      #   1264423 = BaguetteLib
      #   1474749 = Krypton Hybrid
      #   1152077 = Better Forge Chat Reborn (LuckPerms)
      #   282001  = CC: Tweaked
      #   431725  = Advanced Peripherals
      #   656214  = CC:C Bridge (Create integration)
      CURSEFORGE_FILES: |
        361579
        997330
        238551
        1139062
        1264423 
        1152077
        431725
        656214
        997252
      CF_OVERRIDES_EXCLUSIONS: |
        leaves-be-gone
      # Extra mods not on CurseForge (Modrinth project IDs):
      #   fALzjamp        = Chunky
      #   VfHc5JEX        = Chunky Offline
      #   FuyTRq2g        = Create: CC Total Logistics
      #   WZfuGM1m        = Create: CC Better Recipes
      #   cc-tweaked:...  = CC: Tweaked (pinned version)
      #   luckperms:r3YKerOl = LuckPerms v5.4.158-neoforge (version ID bypasses game version check;
      #                         tagged 1.21.5 on Modrinth but is a NeoForge build that works on 1.21.1)
      MODRINTH_PROJECTS: |
        fALzjamp
        VfHc5JEX
        FuyTRq2g
        WZfuGM1m
        cc-tweaked:ZlZHN512
        luckperms:dKAPoPGd
        critters-and-companions
        worldedit
        towns-and-towers
        yungs-better-nether-fortresses
        yungs-better-ocean-monuments
        yungs-better-dungeons
        yungs-better-jungle-temples
        yungs-better-mineshafts
        yungs-better-strongholds
        yungs-better-witch-huts
        yungs-better-desert-temples
        yungs-extras
        camera-mod:7jcUsKq0
        cristel-lib
        create-aeronautics
        sable
      MEMORY: "10288M"
      MOTD: "All of Create 1.21.1"
      USE_MEOWICE_FLAGS: "true"
      TZ: "America/Los_Angeles"
      DIFFICULTY: "3"
      ENABLE_COMMAND_BLOCK: "true"
      ENTITY_BROADCAST_RANGE_PERCENTAGE: "200"
      VIEW_DISTANCE: "18"
      SPAWN_PROTECTION: "0"
      SYNC_CHUNK_WRITES: "false"
      ENABLE_WHITELIST: "true"
      VANILLATWEAKS_SHARECODE: "3sQdEZ"
      ANNOUNCE_PLAYER_ACHIEVEMENTS: "true"
      ENABLE_ROLLING_LOGS: "true"
    volumes:
      - "./data:/data"
      - ./downloads:/downloads

  restore-backup:
    # Same image as mc, but any base image with bash and tar will work
    # Only runs when explicitly requested: docker compose --profile restore up restore-backup
    profiles:
      - restore
    image: itzg/mc-backup
    restart: "no"
    entrypoint: restore-tar-backup
    volumes:
      # Must be same mount as mc service, needs to be writable
      - ./data:/data
      # Must be same mount as backups service, but can be read-only
      - ./mc-backups:/backups:ro
  backups:
    image: itzg/mc-backup
    depends_on:
      mc:
        condition: service_healthy
    environment:
      NAME_WITH_VERSION: true
      BACKUP_INTERVAL: "24h"
      RCON_HOST: mc
      # since this service waits for mc to be healthy, no initial delay is needed
      INITIAL_DELAY: 0
    volumes:
      - ./data:/data:ro
      - ./mc-backups:/backups
